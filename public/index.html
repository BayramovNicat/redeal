<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RE Agregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "-apple-system",
                "BlinkMacSystemFont",
                '"Inter"',
                '"Segoe UI"',
                "sans-serif",
              ],
            },
            colors: {
              border: "hsl(240 3.7% 15.9%)",
              input: "hsl(240 3.7% 15.9%)",
              ring: "hsl(240 4.9% 83.9%)",
              background: "hsl(240 10% 3.9%)",
              foreground: "hsl(0 0% 98%)",
              card: {
                DEFAULT: "hsl(240 10% 3.9%)",
                foreground: "hsl(0 0% 98%)",
              },
              muted: {
                DEFAULT: "hsl(240 3.7% 15.9%)",
                foreground: "hsl(240 5% 64.9%)",
              },
              accent: {
                DEFAULT: "hsl(240 3.7% 15.9%)",
                foreground: "hsl(0 0% 98%)",
              },
            },
          },
        },
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
      }

      /* dark color-scheme for native widgets */
      select,
      input[type="range"] {
        color-scheme: dark;
      }
      select option {
        background: hsl(240 6% 10%);
      }

      /* card hover — needs :hover pseudo-class */
      .card {
        transition: border-color 0.15s;
      }
      .card:hover {
        border-color: hsl(240 3.7% 22%);
      }

      /* input focus ring — :focus pseudo */
      .input-base:focus {
        border-color: hsl(240 4.9% 83.9%);
        box-shadow: 0 0 0 3px hsl(240 4.9% 83.9% / 0.15);
      }

      /* range input — ::-webkit-slider-thumb pseudo */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: hsl(240 3.7% 20%);
        border-radius: 9999px;
        outline: none;
        cursor: pointer;
        margin-top: 8px;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: hsl(0 0% 98%);
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid hsl(240 10% 3.9%);
        box-shadow: 0 0 0 2px hsl(0 0% 98%);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinner {
        animation: spin 0.8s linear infinite;
      }

      /* global label defaults */
      label {
        font-size: 0.75rem;
        color: hsl(240 5% 64.9%);
        font-weight: 500;
        letter-spacing: 0.025em;
        display: block;
        margin-bottom: 0.375rem;
      }

      /* remove number spinners */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      input[type="number"]::placeholder {
        color: hsl(240 5% 40%);
      }

      /* toggle pill — needs checked + sibling selector */
      .toggle-pill {
        display: inline-flex;
        cursor: pointer;
        user-select: none;
      }
      .toggle-pill .pill-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        font-weight: 500;
        padding: 5px 12px;
        border-radius: 9999px;
        border: 1px solid hsl(240 3.7% 22%);
        color: hsl(240 5% 64.9%);
        background: transparent;
        transition: all 0.15s;
      }
      .toggle-pill .pill-label::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: hsl(240 5% 40%);
        transition: background 0.15s;
      }
      .toggle-pill input:checked + .pill-label {
        border-color: hsl(0 0% 98%);
        color: hsl(0 0% 98%);
      }
      .toggle-pill input:checked + .pill-label::before {
        background: hsl(0 0% 98%);
      }

      /* dialog backdrop — ::backdrop pseudo */
      #map-modal::backdrop {
        background: hsl(0 0% 0% / 0.8);
        backdrop-filter: blur(4px);
      }

      /* Leaflet dark overrides */
      .leaflet-container {
        background: hsl(240 10% 8%);
        font-family:
          -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      }
      .leaflet-control-zoom a {
        background: hsl(240 10% 5.5%) !important;
        color: hsl(0 0% 70%) !important;
        border-color: hsl(240 3.7% 18%) !important;
      }
      .leaflet-control-zoom a:hover {
        background: hsl(240 3.7% 15.9%) !important;
        color: hsl(0 0% 98%) !important;
      }

      /* marker pulse — @keyframes */
      @keyframes markerPulse {
        0% {
          box-shadow: 0 0 0 0 hsl(142 69% 58% / 0.5);
        }
        70% {
          box-shadow: 0 0 0 8px hsl(142 69% 58% / 0);
        }
        100% {
          box-shadow: 0 0 0 0 hsl(142 69% 58% / 0);
        }
      }
      .map-marker-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: hsl(142 69% 58%);
        border: 2px solid hsl(0 0% 98%);
        animation: markerPulse 2s ease-out infinite;
      }
    </style>
  </head>
  <body class="min-h-screen bg-background text-foreground font-sans">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-12 space-y-8">
      <!-- header -->
      <div class="space-y-1">
        <h1 class="text-xl font-semibold tracking-tight text-foreground">
          Find Undervalued Deals
        </h1>
        <p class="text-sm text-muted-foreground">
          Discover properties priced below market average in your chosen
          location.
        </p>
      </div>

      <!-- search card -->
      <div class="card bg-card border border-border rounded-xl p-6 space-y-5">
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="col-span-2 space-y-1.5">
            <label for="loc-input">Location</label>
            <select
              id="loc-input"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            >
              <option value="" disabled selected>Loading locations…</option>
            </select>
          </div>
          <div class="col-span-2 space-y-1.5">
            <label for="threshold-input">
              Discount threshold —
              <span id="threshold-val" class="text-foreground font-semibold"
                >10%</span
              >
            </label>
            <input
              id="threshold-input"
              type="range"
              min="1"
              max="50"
              value="10"
            />
            <div
              class="flex justify-between text-[0.7rem] text-muted-foreground mt-1"
            >
              <span>1%</span><span>50%</span>
            </div>
          </div>
        </div>

        <!-- price & area -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="space-y-1.5">
            <label for="min-price-input">Min price (₼)</label>
            <input
              id="min-price-input"
              type="number"
              min="1"
              placeholder="e.g. 30000"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            />
          </div>
          <div class="space-y-1.5">
            <label for="max-price-input">Max price (₼)</label>
            <input
              id="max-price-input"
              type="number"
              min="1"
              placeholder="e.g. 150000"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            />
          </div>
          <div class="space-y-1.5">
            <label for="min-area-input">Min area (m²)</label>
            <input
              id="min-area-input"
              type="number"
              min="1"
              placeholder="e.g. 40"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            />
          </div>
          <div class="space-y-1.5">
            <label for="max-area-input">Max area (m²)</label>
            <input
              id="max-area-input"
              type="number"
              min="1"
              placeholder="e.g. 120"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            />
          </div>
        </div>

        <!-- rooms & floor -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="space-y-1.5">
            <label for="min-rooms-input">Min rooms</label>
            <input
              id="min-rooms-input"
              type="number"
              min="1"
              placeholder="e.g. 2"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            />
          </div>
          <div class="space-y-1.5">
            <label for="max-rooms-input">Max rooms</label>
            <input
              id="max-rooms-input"
              type="number"
              min="1"
              placeholder="e.g. 4"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            />
          </div>
          <div class="space-y-1.5">
            <label for="min-floor-input">Min floor</label>
            <input
              id="min-floor-input"
              type="number"
              min="1"
              placeholder="e.g. 2"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            />
          </div>
          <div class="space-y-1.5">
            <label for="max-floor-input">Max floor</label>
            <input
              id="max-floor-input"
              type="number"
              min="1"
              placeholder="e.g. 10"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            />
          </div>
        </div>

        <!-- building height & category -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="space-y-1.5">
            <label for="max-total-floors-input">Max building floors</label>
            <input
              id="max-total-floors-input"
              type="number"
              min="1"
              placeholder="e.g. 5"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            />
          </div>
          <div class="space-y-1.5">
            <label for="category-input">Category</label>
            <select
              id="category-input"
              class="input-base bg-transparent border border-border text-foreground rounded-lg px-3 py-2 text-sm w-full outline-none transition-[border-color,box-shadow]"
            >
              <option value="">Any</option>
              <option value="new">New build</option>
              <option value="secondary">Secondary</option>
            </select>
          </div>
        </div>

        <!-- boolean toggles -->
        <div class="flex flex-wrap gap-3">
          <label class="toggle-pill m-0">
            <input type="checkbox" id="has-repair" class="sr-only" />
            <span class="pill-label">Repaired</span>
          </label>
          <label class="toggle-pill m-0">
            <input type="checkbox" id="has-document" class="sr-only" />
            <span class="pill-label">Has document</span>
          </label>
          <label class="toggle-pill m-0">
            <input type="checkbox" id="has-mortgage" class="sr-only" />
            <span class="pill-label">Mortgage eligible</span>
          </label>
          <label class="toggle-pill m-0">
            <input type="checkbox" id="is-urgent" class="sr-only" />
            <span class="pill-label">Urgent only</span>
          </label>
        </div>

        <div class="w-full h-px bg-border"></div>

        <div class="flex items-center gap-3">
          <button
            id="search-btn"
            class="inline-flex items-center gap-1.5 bg-foreground text-background rounded-lg px-4 py-2 text-sm font-medium cursor-pointer border-none transition-colors hover:bg-[hsl(0_0%_90%)]"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            Search deals
          </button>
          <span
            id="search-meta"
            class="text-[0.8rem] text-muted-foreground"
          ></span>
        </div>
      </div>

      <!-- loading -->
      <div id="loading" class="hidden text-center py-20 text-muted-foreground">
        <svg
          class="spinner inline-block w-5 h-5 mb-3"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
        <p class="text-sm">Fetching results…</p>
      </div>

      <!-- empty -->
      <div id="empty" class="hidden text-center py-20">
        <div class="text-muted-foreground mb-2">
          <svg
            class="inline-block w-9 h-9 opacity-40"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path d="M21 10.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9.5" />
            <path d="M21 10.5 12 3 3 10.5" />
          </svg>
        </div>
        <p class="text-sm text-muted-foreground">
          No undervalued listings found for that location / threshold.
        </p>
      </div>

      <!-- results grid -->
      <div id="grid" class="grid sm:grid-cols-2 xl:grid-cols-3 gap-4"></div>
    </div>

    <!-- map modal -->
    <dialog
      id="map-modal"
      aria-labelledby="map-modal-title"
      class="p-0 border-0 bg-transparent max-w-[100vw] max-h-[100vh] w-full h-full"
    >
      <div
        class="bg-[hsl(240_10%_5.5%)] border border-border rounded-xl shadow-2xl w-[min(640px,calc(100vw-2rem))] flex flex-col overflow-hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"
      >
        <div
          class="flex items-center justify-between px-5 py-4 border-b border-border gap-4"
        >
          <span
            id="map-modal-title"
            class="text-[0.9rem] font-semibold text-foreground truncate"
            >Property Location</span
          >
          <button
            id="map-modal-close"
            aria-label="Close"
            class="w-7 h-7 rounded-md border-none bg-transparent text-muted-foreground cursor-pointer flex items-center justify-center shrink-0 transition-colors hover:bg-muted hover:text-foreground"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <div id="map-container" class="w-full h-[380px]"></div>
      </div>
    </dialog>

    <!-- card template -->
    <template id="card-tpl">
      <article
        class="card bg-card border border-border rounded-xl p-5 flex flex-col gap-4 cursor-default"
      >
        <!-- top row: location + tier badge -->
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <p class="location text-xs text-muted-foreground truncate mb-1"></p>
            <p
              class="price text-2xl font-bold tracking-tight text-foreground leading-tight"
            ></p>
          </div>
          <span
            class="tier text-[0.7rem] font-medium px-2 py-0.5 rounded-full whitespace-nowrap border border-transparent mt-0.5 shrink-0"
          ></span>
        </div>

        <!-- separator -->
        <div class="w-full h-px bg-border"></div>

        <!-- stats row -->
        <div class="grid grid-cols-4 gap-2 text-center">
          <div class="bg-muted rounded-lg py-2 px-1">
            <p class="text-[0.7rem] text-muted-foreground mb-0.5">Area</p>
            <p class="area text-sm font-medium text-foreground"></p>
          </div>
          <div class="bg-muted rounded-lg py-2 px-1">
            <p class="text-[0.7rem] text-muted-foreground mb-0.5">₼/m²</p>
            <p class="ppsm text-sm font-medium text-foreground"></p>
          </div>
          <div class="bg-muted rounded-lg py-2 px-1">
            <p class="text-[0.7rem] text-muted-foreground mb-0.5">Rooms</p>
            <p class="rooms text-sm font-medium text-foreground"></p>
          </div>
          <div class="bg-muted rounded-lg py-2 px-1">
            <p class="text-[0.7rem] text-muted-foreground mb-0.5">Floor</p>
            <p class="floor text-sm font-medium text-foreground"></p>
          </div>
        </div>

        <!-- avg vs discount -->
        <div class="flex items-center justify-between text-[0.78rem]">
          <span class="text-muted-foreground">Market avg</span>
          <span class="avg text-[hsl(240_5%_80%)] font-medium"></span>
          <span class="discount font-semibold"></span>
        </div>

        <!-- footer: link + map pin -->
        <div class="flex items-center justify-between mt-auto">
          <a
            class="link text-xs text-muted-foreground no-underline inline-flex items-center gap-1 transition-colors hover:text-foreground"
            target="_blank"
            rel="noopener noreferrer"
          >
            View listing
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M7 7h10v10" />
              <path d="M7 17 17 7" />
            </svg>
          </a>
          <button
            class="map-pin-btn hidden text-xs text-muted-foreground bg-transparent border-none cursor-pointer p-0 inline-flex items-center gap-1 transition-colors hover:text-foreground"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"
              />
              <circle cx="12" cy="10" r="3" />
            </svg>
            Map
          </button>
        </div>
      </article>
    </template>

    <script>
      const thresholdInput = document.getElementById("threshold-input");
      thresholdInput.addEventListener("input", () => {
        document.getElementById("threshold-val").textContent =
          `${thresholdInput.value}%`;
      });

      function fmt(n, d = 0) {
        return Number(n).toLocaleString("az-AZ", { maximumFractionDigits: d });
      }

      function tierStyle(tier) {
        if (tier === "High Value Deal")
          return {
            bg: "hsl(142 50% 15%)",
            color: "hsl(142 69% 58%)",
            border: "hsl(142 50% 25%)",
          };
        if (tier === "Good Deal")
          return {
            bg: "hsl(217 50% 15%)",
            color: "hsl(217 91% 60%)",
            border: "hsl(217 50% 25%)",
          };
        if (tier === "Fair Price")
          return {
            bg: "hsl(45 50% 15%)",
            color: "hsl(45 93% 58%)",
            border: "hsl(45 50% 25%)",
          };
        return {
          bg: "hsl(0 50% 15%)",
          color: "hsl(0 84% 60%)",
          border: "hsl(0 50% 25%)",
        };
      }

      function discountColor(tier) {
        if (tier === "High Value Deal") return "hsl(142 69% 58%)";
        if (tier === "Good Deal") return "hsl(217 91% 60%)";
        return "hsl(0 0% 98%)";
      }

      function buildCard(p) {
        const tpl = document.getElementById("card-tpl").content.cloneNode(true);
        const q = (sel) => tpl.querySelector("." + sel);

        q("location").textContent = p.location_name ?? p.district ?? "—";
        q("price").textContent = `₼ ${fmt(p.price)}`;
        q("area").textContent = `${fmt(p.area_sqm, 1)} m²`;
        q("ppsm").textContent = fmt(p.price_per_sqm, 0);
        q("rooms").textContent = p.rooms ?? "—";
        q("floor").textContent =
          p.floor != null && p.total_floors != null
            ? `${p.floor}/${p.total_floors}`
            : p.floor != null
              ? `${p.floor}`
              : "—";
        q("avg").textContent = `₼${fmt(p.location_avg_price_per_sqm, 0)}/m²`;

        const disc = q("discount");
        disc.textContent = `-${p.discount_percent}%`;
        disc.style.color = discountColor(p.tier);

        const ts = tierStyle(p.tier);
        const tierEl = q("tier");
        tierEl.textContent = p.tier;
        tierEl.style.background = ts.bg;
        tierEl.style.color = ts.color;
        tierEl.style.borderColor = ts.border;

        tpl.querySelector(".link").href = p.source_url;

        const pinBtn = tpl.querySelector(".map-pin-btn");
        if (p.latitude != null && p.longitude != null) {
          pinBtn.classList.remove("hidden");
          pinBtn.addEventListener("click", () => {
            openMapModal(
              p.latitude,
              p.longitude,
              p.location_name ?? p.district ?? "",
            );
          });
        }

        return tpl;
      }

      function val(id) {
        return document.getElementById(id).value.trim();
      }
      function checked(id) {
        return document.getElementById(id).checked;
      }

      async function search() {
        const loc = val("loc-input");
        const threshold = thresholdInput.value;
        const loading = document.getElementById("loading");
        const empty = document.getElementById("empty");
        const grid = document.getElementById("grid");
        const meta = document.getElementById("search-meta");

        if (!loc) {
          document.getElementById("loc-input").focus();
          return;
        }

        grid.innerHTML = "";
        empty.classList.add("hidden");
        meta.textContent = "";
        loading.classList.remove("hidden");

        try {
          const params = new URLSearchParams({ location: loc, threshold });
          const set = (key, id) => {
            const v = val(id);
            if (v) params.set(key, v);
          };
          set("minPrice", "min-price-input");
          set("maxPrice", "max-price-input");
          set("minArea", "min-area-input");
          set("maxArea", "max-area-input");
          set("minRooms", "min-rooms-input");
          set("maxRooms", "max-rooms-input");
          set("minFloor", "min-floor-input");
          set("maxFloor", "max-floor-input");
          set("maxTotalFloors", "max-total-floors-input");
          set("category", "category-input");
          if (checked("has-repair")) params.set("hasRepair", "true");
          if (checked("has-document")) params.set("hasDocument", "true");
          if (checked("has-mortgage")) params.set("hasMortgage", "true");
          if (checked("is-urgent")) params.set("isUrgent", "true");
          const r = await fetch(`/api/deals/undervalued?${params}`);
          const d = await r.json();
          loading.classList.add("hidden");

          if (d.error) {
            meta.textContent = `Error: ${d.error}`;
            return;
          }

          meta.textContent = `${d.count} result${d.count !== 1 ? "s" : ""}`;
          if (!d.data?.length) {
            empty.classList.remove("hidden");
            return;
          }
          d.data.forEach((p) => grid.appendChild(buildCard(p)));
        } catch (e) {
          loading.classList.add("hidden");
          meta.textContent = `Error: ${e.message}`;
        }
      }

      // ── Map modal ──────────────────────────────────────────────────
      let leafletMap = null;
      let leafletMarker = null;

      function initMap() {
        if (leafletMap) return;
        leafletMap = L.map("map-container", {
          zoomControl: true,
          attributionControl: false,
        });
        L.tileLayer(
          "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
          {
            subdomains: "abcd",
            maxZoom: 19,
          },
        ).addTo(leafletMap);

        const markerIcon = L.divIcon({
          className: "",
          html: '<div class="map-marker-dot"></div>',
          iconSize: [14, 14],
          iconAnchor: [7, 7],
        });
        leafletMarker = L.marker([0, 0], { icon: markerIcon }).addTo(
          leafletMap,
        );
      }

      function openMapModal(lat, lng, label) {
        const modal = document.getElementById("map-modal");
        document.getElementById("map-modal-title").textContent =
          label || "Property Location";
        modal.showModal();
        requestAnimationFrame(() => {
          initMap();
          leafletMap.invalidateSize();
          leafletMarker.setLatLng([lat, lng]);
          leafletMap.setView([lat, lng], 15, { animate: false });
        });
      }

      document
        .getElementById("map-modal-close")
        .addEventListener("click", () => {
          document.getElementById("map-modal").close();
        });

      document.getElementById("map-modal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) e.currentTarget.close();
      });
      // ───────────────────────────────────────────────────────────────

      document.getElementById("search-btn").addEventListener("click", search);

      // populate locations
      (async () => {
        const select = document.getElementById("loc-input");
        try {
          const r = await fetch("/api/deals/locations");
          const d = await r.json();
          select.innerHTML =
            '<option value="" disabled selected>Select a location…</option>';
          d.data.forEach((loc) => {
            const opt = document.createElement("option");
            opt.value = loc;
            opt.textContent = loc;
            select.appendChild(opt);
          });
        } catch {
          select.innerHTML =
            '<option value="" disabled selected>Failed to load locations</option>';
        }
      })();
    </script>
  </body>
</html>
